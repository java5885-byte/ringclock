<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RingClock">
<meta name="theme-color" content="#ccff00">
<title>RingClock</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
  :root {
    --neon: #ccff00;
    --neon-rest: #00e5ff;
    --bg: #000000;
  }
  html, body { height: 100%; background: var(--bg); font-family: -apple-system, "Helvetica Neue", Arial, sans-serif; overflow: hidden; }
  body { color: var(--neon); padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }

  #app { width: 100%; height: 100%; display: flex; flex-direction: column; transition: background 0.3s; }

  #topbar {
    flex: 0 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    padding: 3vw 5vw 0;
  }
  #brand { display: flex; align-items: center; gap: 2vw; font-weight: 800; letter-spacing: 0.12em; font-size: 4.5vw; text-shadow: 0 0 10px var(--neon); }
  #brand img { width: 8vw; max-width: 40px; height: auto; }
  #installBtn {
    border: 2px solid var(--neon); background: transparent; color: var(--neon);
    border-radius: 999px; padding: 1.6vw 4vw; font-size: 3.4vw; font-weight: 700;
    box-shadow: 0 0 10px var(--neon); display: none;
  }
  #installBtn:active { background: rgba(204,255,0,0.18); }

  #stage { flex: 1 1 auto; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3vh; }
  #phase { font-size: 9vw; font-weight: 800; letter-spacing: 0.15em; text-transform: uppercase; text-shadow: 0 0 12px currentColor, 0 0 28px currentColor; }
  #time { font-size: 33vw; font-weight: 900; font-variant-numeric: tabular-nums; line-height: 1; text-shadow: 0 0 18px currentColor, 0 0 45px currentColor; }

  #controls { display: flex; gap: 6vw; margin-top: 2vh; }
  .btn {
    width: 22vw; height: 22vw; max-width: 110px; max-height: 110px; border-radius: 50%;
    border: 3px solid var(--neon); background: transparent; color: var(--neon);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 14px var(--neon), inset 0 0 10px rgba(204,255,0,0.25);
    transition: transform 0.08s, background 0.15s;
  }
  .btn span { font-size: 8vw; }
  .btn:active { transform: scale(0.9); background: rgba(204,255,0,0.15); }

  #footer { flex: 0 0 auto; text-align: center; padding: 0 5vw 3vw; display: flex; flex-direction: column; align-items: center; gap: 1.6vh; }
  #hint { font-size: 3.2vw; opacity: 0.7; line-height: 1.5; }
  #iconBtn {
    border: 2px solid var(--neon); background: transparent; color: var(--neon);
    border-radius: 999px; padding: 1.4vw 4.5vw; font-size: 3.4vw; font-weight: 700;
    box-shadow: 0 0 10px var(--neon);
  }
  #iconBtn:active { background: rgba(204,255,0,0.18); }

  #app.rest { color: var(--neon-rest); }
  #app.rest .btn { border-color: var(--neon-rest); color: var(--neon-rest); box-shadow: 0 0 14px var(--neon-rest), inset 0 0 10px rgba(0,229,255,0.25); }

  .flash { animation: flash 0.45s ease-out; }
  @keyframes flash { 0% { background: rgba(204,255,0,0.45); } 100% { background: #000; } }

  /* 가로 모드: 높이 기준으로 크기를 줄여 화면에 맞춤 */
  @media (orientation: landscape) and (max-height: 560px) {
    #topbar { padding: 1.5vh 4vw 0; }
    #brand { font-size: 3.6vh; gap: 1.5vh; }
    #brand img { width: 6vh; max-width: 36px; }
    #installBtn { font-size: 2.7vh; padding: 1vh 2.6vh; }
    #stage { gap: 1vh; }
    #phase { font-size: min(7vh, 8vw); }
    #time { font-size: min(32vh, 20vw); }
    #controls { gap: 6vh; margin-top: 0.5vh; }
    .btn { width: 15vh; height: 15vh; }
    .btn span { font-size: 7.5vh; }
    #footer { padding: 0 4vw 1.5vh; }
    #hint { font-size: 2.4vh; }
    #iconBtn { font-size: 2.4vh; padding: 0.8vh 2.4vh; }
  }
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div id="brand"><img src="icon.svg" alt="RingClock"><span>RingClock</span></div>
    <button id="installBtn">앱 설치</button>
  </div>

  <div id="stage">
    <div id="phase">ROUND 1</div>
    <div id="time">03:00</div>
    <div id="controls">
      <button class="btn" id="playBtn"><span>▶</span></button>
      <button class="btn" id="stopBtn"><span>⏸</span></button>
      <button class="btn" id="resetBtn"><span>⟲</span></button>
    </div>
  </div>

  <div id="footer">
    <div id="hint">홈 화면에 추가하면 앱 아이콘이 생기고 앱처럼 실행돼요.</div>
    <button id="iconBtn">🥊 아이콘 이미지 저장</button>
  </div>
</div>

<script>
  const ROUND_SEC = 180; // 3분
  const REST_SEC  = 30;  // 30초 휴식

  const app = document.getElementById('app');
  const phaseEl = document.getElementById('phase');
  const timeEl = document.getElementById('time');

  let round = 1, isRest = false, remaining = ROUND_SEC, running = false, timer = null;

  // ---- 종소리 (Web Audio) ----
  let audioCtx = null;
  function ensureAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }
  function bell(times = 3) {
    if (!audioCtx) return;
    const now = audioCtx.currentTime;
    for (let i = 0; i < times; i++) {
      const t = now + i * 0.32;
      [880, 1320, 1760].forEach((f, idx) => {
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = f;
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(idx === 0 ? 0.5 : 0.25, t + 0.01);
        g.gain.exponentialRampToValueAtTime(0.0008, t + 0.3);
        osc.connect(g).connect(audioCtx.destination);
        osc.start(t); osc.stop(t + 0.32);
      });
    }
  }

  function fmt(s) {
    const m = Math.floor(s / 60), sec = s % 60;
    return String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
  }
  function render() {
    phaseEl.textContent = isRest ? 'REST' : ('ROUND ' + round);
    timeEl.textContent = fmt(remaining);
    app.classList.toggle('rest', isRest);
  }
  function flash() { app.classList.remove('flash'); void app.offsetWidth; app.classList.add('flash'); }

  function tick() {
    remaining--;
    if (remaining < 0) {
      if (isRest) { isRest = false; round++; remaining = ROUND_SEC; bell(3); }
      else { isRest = true; remaining = REST_SEC; bell(1); }
      flash();
    }
    render();
  }
  function play() {
    ensureAudio();
    if (running) return;
    running = true;
    acquireWakeLock();
    if (!isRest && round === 1 && remaining === ROUND_SEC) bell(3);
    timer = setInterval(tick, 1000);
  }
  function stop() { running = false; clearInterval(timer); releaseWakeLock(); }
  function reset() { stop(); round = 1; isRest = false; remaining = ROUND_SEC; render(); }

  document.getElementById('playBtn').addEventListener('click', play);
  document.getElementById('stopBtn').addEventListener('click', stop);
  document.getElementById('resetBtn').addEventListener('click', reset);

  // ---- 화면 꺼짐 방지 (Wake Lock) : 타이머 동작 중 화면 유지 ----
  let wakeLock = null;
  async function acquireWakeLock() {
    try {
      if ('wakeLock' in navigator && document.visibilityState === 'visible') {
        wakeLock = await navigator.wakeLock.request('screen');
        wakeLock.addEventListener('release', () => { wakeLock = null; });
      }
    } catch (e) {}
  }
  async function releaseWakeLock() {
    try { if (wakeLock) { await wakeLock.release(); wakeLock = null; } } catch (e) {}
  }
  // 화면이 꺼졌다 다시 켜지거나 앱으로 돌아오면, 타이머가 돌고 있을 때 다시 잠금
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && running && !wakeLock) acquireWakeLock();
  });

  // ---- PWA: 설치 / 홈 화면 추가 ----
  const installBtn = document.getElementById('installBtn');
  let deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    installBtn.style.display = 'inline-block';
  });
  installBtn.addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
    installBtn.style.display = 'none';
  });
  window.addEventListener('appinstalled', () => { installBtn.style.display = 'none'; });

  // iOS 안내 (Safari는 beforeinstallprompt 미지원)
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
  const standalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
  if (isIOS && !standalone) {
    document.getElementById('hint').innerHTML =
      '아이폰: 공유 <b>⎙</b> → <b>홈 화면에 추가</b> 하면 앱 아이콘이 생겨요.';
  }

  // ---- 아이콘 이미지 저장 (브라우저에서 SVG → PNG 변환) ----
  const ICON_SVG = `\n<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">\n<defs>\n<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0a0a0a"/><stop offset="1" stop-color="#1a1f00"/></linearGradient>\n<linearGradient id="glove" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#e6ff33"/><stop offset="1" stop-color="#aacc00"/></linearGradient>\n</defs>\n<rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>\n<rect x="8" y="8" width="496" height="496" rx="106" fill="none" stroke="#ccff00" stroke-width="6" opacity="0.5"/>\n<g transform="translate(256 268) rotate(-12)">\n<path fill="url(#glove)" stroke="#1a1f00" stroke-width="8" stroke-linejoin="round" d="M-118 -40 C -132 -118 -70 -150 -8 -150 C 70 -150 132 -104 132 -18 C 132 70 70 132 -14 132 C -86 132 -118 96 -126 50 C -150 50 -150 -2 -126 -2 Z"/>\n<path fill="url(#glove)" stroke="#1a1f00" stroke-width="8" stroke-linejoin="round" d="M-118 6 C -156 6 -160 -56 -120 -58 C -96 -60 -86 -34 -92 -10 Z"/>\n<path fill="none" stroke="#1a1f00" stroke-width="7" stroke-linecap="round" opacity="0.55" d="M44 -132 C 70 -70 70 60 38 122"/>\n<rect x="-70" y="116" width="118" height="56" rx="20" fill="#0a0a0a" stroke="#ccff00" stroke-width="7"/>\n<line x1="-44" y1="144" x2="22" y2="144" stroke="#ccff00" stroke-width="7" stroke-linecap="round"/>\n</g>\n</svg>`;

  function saveIcon() {
    const size = 512;
    const svgBlob = new Blob([ICON_SVG], { type: 'image/svg+xml;charset=utf-8' });
    const url = URL.createObjectURL(svgBlob);
    const img = new Image();
    img.onload = function () {
      const c = document.createElement('canvas');
      c.width = size; c.height = size;
      const ctx = c.getContext('2d');
      ctx.drawImage(img, 0, 0, size, size);
      URL.revokeObjectURL(url);
      c.toBlob(function (png) {
        const pngUrl = URL.createObjectURL(png);
        const a = document.createElement('a');
        a.href = pngUrl;
        a.download = 'RingClock-icon.png';
        document.body.appendChild(a);
        a.click();
        a.remove();
        // iOS 등 다운로드 미지원 환경: 새 탭으로 열어 길게 눌러 저장
        setTimeout(function () {
          if (isIOS) window.open(pngUrl, '_blank');
          else URL.revokeObjectURL(pngUrl);
        }, 200);
      }, 'image/png');
    };
    img.onerror = function () { URL.revokeObjectURL(url); alert('아이콘 생성에 실패했어요. 다시 시도해 주세요.'); };
    img.src = url;
  }
  document.getElementById('iconBtn').addEventListener('click', saveIcon);

  // 서비스 워커 등록
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
  }

  render();
</script>
</body>
</html>
